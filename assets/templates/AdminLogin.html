{% extends 'base.html' %}
{% load static %}

{% block contents %}

<section class="py-12 px-6 max-w-5xl mx-auto bg-white rounded-xl shadow-md mt-10">
  <h2 class="text-2xl font-semibold text-center text-indigo-700 mb-8">Admin Login Form</h2>

  <div class="flex justify-center">
    <div class="bg-gray-50 rounded-lg shadow-md p-6 w-full max-w-sm">

      <form action="{% url 'AdminLoginCheck' %}" method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
          <input type="text" name="loginid" required
                 placeholder="Enter Login ID"
                 class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-black bg-white" />
        </div>

        <div>
          <input type="password" name="pswd" required
                 placeholder="Enter Password"
                 class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-black bg-white" />
        </div>

        <div class="flex justify-between gap-3">
          <button type="submit"
                  class="w-full bg-indigo-600 text-white font-medium py-2 px-4 rounded-md hover:bg-indigo-700 transition">
            Login
          </button>
          <button type="reset"
                  class="w-full bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-md hover:bg-gray-400 transition">
            Reset
          </button>
        </div>

        {% if messages %}
        <div class="text-green-600 text-center mt-4">
          {% for message in messages %}
            {{ message }}
          {% endfor %}
        </div>
        {% endif %}
      </form>

    </div>
  </div>
</section>

{% endblock %}
